<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencilsmith</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='75' font-size='80' text-anchor='middle' fill='%23222' font-family='serif'>P</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lustria&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            position: relative;
            min-height: 100svh;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 30px 8%;
            isolation: isolate;
            color: #171713;
            background-color: #f8f8f5;
            font-family: 'Lustria', serif;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            margin: auto;
        }

        .paper-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .title {
            width: max-content;
            font-size: clamp(36px, 5vw, 64px);
            line-height: 1;
            font-weight: 400;
            color: #22211d;
        }

        .title-canvas {
            display: none;
        }

        .title.is-rendered .title-fallback {
            display: none;
        }

        .title.is-rendered .title-canvas {
            display: block;
        }

        .tagline {
            margin-top: clamp(7px, 0.9vw, 11px);
            margin-left: clamp(1px, 0.21vw, 3px);
            color: rgba(34, 33, 29, 0.66);
            font-size: clamp(12px, 1.3vw, 15px);
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: 0.075em;
            white-space: nowrap;
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <canvas class="paper-canvas" aria-hidden="true"></canvas>

    <main class="container">
        <h1 class="title" aria-label="Pencilsmith">
            <span class="title-fallback" aria-hidden="true">Pencilsmith</span>
            <canvas class="title-canvas" aria-hidden="true">Pencilsmith</canvas>
        </h1>
        <p class="tagline">Somewhere between minimal and zero.</p>
    </main>

    <script>
        (() => {
            const canvas = document.querySelector('.paper-canvas');
            let resizeTimer;

            function createRandom(seed) {
                return function random() {
                    seed |= 0;
                    seed = seed + 0x6D2B79F5 | 0;
                    let value = Math.imul(seed ^ seed >>> 15, 1 | seed);
                    value = value + Math.imul(value ^ value >>> 7, 61 | value) ^ value;
                    return ((value ^ value >>> 14) >>> 0) / 4294967296;
                };
            }

            function renderPaper() {
                const pixelRatio = Math.min(window.devicePixelRatio || 1, 1.5);
                const width = window.innerWidth;
                const height = window.innerHeight;
                const physicalWidth = Math.ceil(width * pixelRatio);
                const physicalHeight = Math.ceil(height * pixelRatio);
                const context = canvas.getContext('2d');
                const random = createRandom(0x50415045 + width * 17 + height);

                canvas.width = physicalWidth;
                canvas.height = physicalHeight;

                const texture = context.createImageData(physicalWidth, physicalHeight);

                for (let index = 0; index < texture.data.length; index += 4) {
                    if (random() < 0.86) {
                        const warmth = Math.floor(random() * 9);
                        texture.data[index] = 65 + warmth;
                        texture.data[index + 1] = 61 + warmth;
                        texture.data[index + 2] = 51 + warmth;
                        texture.data[index + 3] = Math.floor(random() * 9);
                    } else {
                        texture.data[index] = 255;
                        texture.data[index + 1] = 254;
                        texture.data[index + 2] = 250;
                        texture.data[index + 3] = Math.floor(random() * 11);
                    }
                }

                context.putImageData(texture, 0, 0);
                context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
                context.lineCap = 'round';
                context.lineJoin = 'round';

                const hatchAngle = -Math.PI / 10;
                const hatchExtent = Math.hypot(width, height) * 1.1;
                const hatchSpacing = 4.4;
                const hatchCount = Math.ceil(hatchExtent / hatchSpacing);
                const segmentCount = Math.ceil(hatchExtent / 48);

                context.save();
                context.translate(width / 2, height / 2);
                context.rotate(hatchAngle);

                for (let line = 0; line <= hatchCount; line += 1) {
                    const baseY = -hatchExtent / 2 + line * hatchSpacing
                        + random() * 0.7 - 0.35;
                    const phase = random() * Math.PI * 2;

                    context.beginPath();

                    for (let segment = 0; segment <= segmentCount; segment += 1) {
                        const progress = segment / segmentCount;
                        const x = -hatchExtent / 2 + hatchExtent * progress;
                        const wave = Math.sin(progress * Math.PI * 4 + phase) * 0.22;
                        const jitter = random() * 0.36 - 0.18;
                        const y = baseY + wave + jitter;

                        if (segment === 0 || random() < 0.045) {
                            context.moveTo(x, y);
                        } else {
                            context.lineTo(x, y);
                        }
                    }

                    context.lineWidth = 0.2 + random() * 0.28;
                    context.strokeStyle = `rgba(42, 41, 38, ${0.045 + random() * 0.045})`;
                    context.stroke();
                }

                context.restore();

                const edgeShade = context.createRadialGradient(
                    width * 0.5,
                    height * 0.48,
                    Math.min(width, height) * 0.2,
                    width * 0.5,
                    height * 0.48,
                    Math.hypot(width, height) * 0.58
                );

                edgeShade.addColorStop(0, 'rgba(72, 64, 48, 0)');
                edgeShade.addColorStop(0.62, 'rgba(72, 64, 48, 0)');
                edgeShade.addColorStop(1, 'rgba(72, 64, 48, 0.018)');
                context.fillStyle = edgeShade;
                context.fillRect(0, 0, width, height);
            }

            window.addEventListener('load', renderPaper, { once: true });
            window.addEventListener('resize', () => {
                window.clearTimeout(resizeTimer);
                resizeTimer = window.setTimeout(renderPaper, 180);
            }, { passive: true });
        })();
    </script>

        const title = document.querySelector('.title');
        const canvas = document.querySelector('.title-canvas');
        let resizeTimer;

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function decodeOperations(encoded) {
            const binary = window.atob(encoded);
            const bytes = new Uint8Array(binary.length);

            for (let index = 0; index < binary.length; index += 1) {
                bytes[index] = binary.charCodeAt(index);
            }

            return new DataView(bytes.buffer);
        }

        Object.values(drawing.v).forEach(layers => {
            layers.forEach(layer => {
                layer.d = layer.d.map(([type, encoded]) => [
                    type,
                    decodeOperations(encoded)
                ]);
            });
        });

        function traceOperations(context, operations) {
            let offset = 0;

            function readCoordinate() {
                const value = operations.getUint16(offset, true) / 100;
                offset += 2;
                return value;
            }

            context.beginPath();

            while (offset < operations.byteLength) {
                const operation = operations.getUint16(offset, true);
                offset += 2;

                if (operation === 0) {
                    context.moveTo(readCoordinate(), readCoordinate());
                } else if (operation === 1) {
                    context.bezierCurveTo(
                        readCoordinate(),
                        readCoordinate(),
                        readCoordinate(),
                        readCoordinate(),
                        readCoordinate(),
                        readCoordinate()
                    );
                } else {
                    context.lineTo(readCoordinate(), readCoordinate());
                }
            }
        }

        function drawLayer(context, layer) {
            layer.d.forEach(([type, operations]) => {
                traceOperations(context, operations);

                if (type === 'f') {
                    context.fillStyle = layer.f;
                    context.fill('evenodd');
                } else {
                    context.strokeStyle = type === 'h' ? layer.f : layer.s;
                    context.lineWidth = type === 'h' ? layer.g : layer.w;
                    context.stroke();
                }
            });
        }

        function renderTitle() {
            const fontSize = clamp(window.innerWidth * 0.05, 36, 64);
            const scale = fontSize / drawing.z;
            const pixelRatio = Math.min(window.devicePixelRatio || 1, 2.5);
            const width = drawing.w * scale;
            const height = drawing.h * scale;

            canvas.width = Math.ceil(width * pixelRatio);
            canvas.height = Math.ceil(height * pixelRatio);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            canvas.style.marginLeft = `${-drawing.p * scale}px`;

            const context = canvas.getContext('2d');
            context.setTransform(scale * pixelRatio, 0, 0, scale * pixelRatio, 0, 0);
            context.lineCap = 'round';
            context.lineJoin = 'round';

            const layers = fontSize <= 52 ? drawing.v.s : drawing.v.l;
            layers.forEach(layer => drawLayer(context, layer));
            title.classList.add('is-rendered');
        }

        renderTitle();

        window.addEventListener('resize', () => {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(renderTitle, 120);
        }, { passive: true });
    </script>
