<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencilsmith</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='75' font-size='80' text-anchor='middle' fill='%23222' font-family='serif'>P</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lustria&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            position: relative;
            min-height: 100svh;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 30px 8%;
            isolation: isolate;
            color: #171713;
            background-color: #fafafa;
            font-family: 'Lustria', serif;
        }

        .container {
            width: 100%;
            max-width: 960px;
            margin: auto;
        }

        .title {
            font-size: clamp(36px, 5vw, 64px);
            line-height: 1;
            font-weight: 400;
        }

    </style>
</head>
<body>
    <main class="container">
        <h1 class="title">Pencilsmith</h1>
    </main>
</body>
</html>
